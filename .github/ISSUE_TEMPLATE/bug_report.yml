name: Bug report
description: Report broken behavior with reproducible steps
labels:
  - bug
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Chat history cards duplicate after route change
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Node 20, Chrome 135
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs / screenshots / recordings
      description: Paste stack traces or attach UI evidence
  - type: checkboxes
    id: precheck
    attributes:
      label: Pre-submission checks
      options:
        - label: I checked for duplicate issues.
          required: true
        - label: I included enough detail for maintainers to reproduce.
          required: true

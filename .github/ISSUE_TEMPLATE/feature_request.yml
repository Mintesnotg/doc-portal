name: Feature request
description: Propose a product or developer-experience enhancement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal. Please provide enough detail so contributors can implement this without follow-up guesswork.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the feature
      placeholder: Add searchable filters to chat history
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chatbot
        - Auth and session
        - Admin dashboard
        - API route adapters
        - UI and accessibility
        - Developer experience
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: Describe behavior, UX, and technical direction
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use checklist format
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: technical-notes
    attributes:
      label: Technical notes
      description: Optional implementation hints, API contract notes, dependencies
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution readiness
      options:
        - label: I can help implement this feature.
          required: false
        - label: I checked for duplicate issues before filing.
          required: true
